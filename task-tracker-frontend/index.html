<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <div class="container-eg-btn-4">
      <a class="button button-3" id="add-task-button">Add task</a>
    </div>
    <input class="theme-toggle" type='checkbox'>
  </aside>
  <main class="main-content">
    <div class="header">
      <div class="avatar" id="avatar"></div>

      <div class="user-container" id="user-container">
        <div class="form-container" id="form-container">
          <input type="checkbox" id="chk" aria-hidden="true">

          <div class="signup">
            <form id="signup-form">
              <label for="chk" aria-hidden="true">Sign up</label>
              <input type="text" name="username" placeholder="Username" required="">
              <input type="email" name="email" placeholder="Email" required="">
              <input type="password" name="password" placeholder="Password" required="">
              <button type="submit">Sign up</button>
            </form>
          </div>

          <div class="login">
            <form id="login-form">
              <label for="chk" aria-hidden="true">Login</label>
              <input type="email" name="email" placeholder="Email" required="">
              <input type="password" name="password" placeholder="Password" required="">
              <button type="submit">Login</button>
            </form>
          </div>
        </div>
        <div class="account-info" id="account-info" hidden>
          <h2>Привет, <span id="username"></span>!</h2>
          <p>Email: <span id="user-email"></span></p>
          <button id="logout-button">Выйти</button>
        </div>
      </div>
    </div>
    <button class="button button-3" id="show-tasks">Show tasks</button>
    <div id="taskModal" style="display: none;">
      <h1>Task Details</h1>
      <button>Close</button>
    </div>
    <div id="tasksContainer" class="tasks-container">
    </div>
  </main>
</div>
  <script type="module" src="./src/main.js" defer></script>
</body>
</html>
